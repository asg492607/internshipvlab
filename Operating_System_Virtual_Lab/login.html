<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav>

<h2 id="pageTitle">
Login
</h2>

<div class="nav-right">

<button id="themeToggle">
🌙 Dark
</button>

<a href="index.html"
class="back-btn">
⬅ Back
</a>

</div>

</nav>

<div class="login-container">

<div class="login-card">

<h1>Login</h1>

<input
type="email"
id="username"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<select id="role">

<option value="student">
Student
</option>

<option value="teacher">
Teacher
</option>

<option value="admin">
Admin
</option>

</select>

<button onclick="loginUser()">
Login
</button>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</div>

<script src="js/theme.js"></script>

<script src="js/login.js"></script>

</body>

</html>
